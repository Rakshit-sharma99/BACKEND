# ========== HTTP SERVER (for cert challenge + redirect) ==========
server {
    listen 80;
    server_name universe.macbease.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ========== HTTPS SERVER ==========
server {
    listen 443 ssl;
    server_name universe.macbease.com;

    ssl_certificate /etc/letsencrypt/live/universe.macbease.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/universe.macbease.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # ========= STANDARD HEADERS ==========
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # ========= ALL YOUR EXISTING LOCATIONS ==========
    location /universe/ { proxy_pass http://universe:5050; }
    location /ipls/ { proxy_pass http://ipls:5010; }
    location /multiverse/ { proxy_pass http://multiverse:5020; }
    location /content/ { proxy_pass http://content:5000; }
    location /card/ { proxy_pass http://card:5030; }
    location /resource/ { proxy_pass http://resource:5040; }
    location /event/ { proxy_pass http://event:5060; }
    location /bag/ { proxy_pass http://bag:5090; }
    location /badge/ { proxy_pass http://badge:6020; }
    location /macbeaseContent/ { proxy_pass http://macbeaseContent:5070; }
    location /offer/ { proxy_pass http://offer:5080; }
    location /quest/ { proxy_pass http://quest:6010; }
    location /invitation/ { proxy_pass http://invitation:6030; }
    location /project/ { proxy_pass http://project:6040; }
    location /itinerary/ { proxy_pass http://itinerary:6050; }
    location /joinLink/ { proxy_pass http://joinLink:6060; }
    location /tile/ { proxy_pass http://tile:6070; }
    location /org/ { proxy_pass http://org:6080; }
    location /unsorted/ { proxy_pass http://unsorted:6090; }
    location /ticket/ { proxy_pass http://ticket:6000; }
    location /refund/ { proxy_pass http://refund:7000; }
    location /blog/ { proxy_pass http://blog:7010; }
    location /coupon/ { proxy_pass http://coupon:7020; }
    location /memory/ { proxy_pass http://memory:7030; }
    location /overlay/ { proxy_pass http://overlay:7040; }

    location / {
        return 200 'Multiverse Gateway Running (HTTPS)';
        add_header Content-Type text/plain;
    }
}
