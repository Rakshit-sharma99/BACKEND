# ===============================
# LOCAL HTTP SERVER (Port 80)
# ===============================
server {
    resolver 127.0.0.11 valid=30s;
    listen 80;
    server_name localhost universe.macbease.com;

    # ========= STANDARD HEADERS ==========
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # ========= UNIVERSE ==========
    location /universe/ { set $upstream_universe universe:5050;
        proxy_pass http://$upstream_universe; }

    # ========= IPLS ==========
    location /ipls/ { set $upstream ipls:5010; proxy_pass http://$upstream; }

    # ========= MULTIVERSE ==========
    location /multiverse/ { set $upstream_multiverse multiverse:5020;
        proxy_pass http://$upstream_multiverse; }

    # ========= CONTENT ==========
    location /content/ { set $upstream_content content:5000;
        proxy_pass http://$upstream_content; }

    # ========= CARD ==========
    location /card/ { set $upstream_card card:5030;
        proxy_pass http://$upstream_card; }

    # ========= RESOURCE ==========
    location /resource/ { set $upstream_resource resource:5040;
        proxy_pass http://$upstream_resource; }

    # ========= EVENT ==========
    location /event/ { set $upstream_event event:5060;
        proxy_pass http://$upstream_event; }

    # ========= BAG ==========
    location /bag/ { set $upstream_bag bag:5090;
        proxy_pass http://$upstream_bag; }

    # ========= BADGE ==========
    location /badge/ { set $upstream_badge badge:6020;
        proxy_pass http://$upstream_badge; }

    # ========= MACBEASE CONTENT ==========
    location /macbeaseContent/ { set $upstream_macbeaseContent macbeaseContent:5070;
        proxy_pass http://$upstream_macbeaseContent; }

    # ========= OFFER ==========
    location /offer/ { set $upstream_offer offer:5080;
        proxy_pass http://$upstream_offer; }

    # ========= QUEST ==========
    location /quest/ { set $upstream_quest quest:6010;
        proxy_pass http://$upstream_quest; }

    # ========= INVITATION ==========
    location /invitation/ { set $upstream_invitation invitation:6030;
        proxy_pass http://$upstream_invitation; }

    # ========= PROJECT ==========
    location /project/ { set $upstream_project project:6040;
        proxy_pass http://$upstream_project; }

    # ========= ITINERARY ==========
    location /itinerary/ { set $upstream_itinerary itinerary:6050;
        proxy_pass http://$upstream_itinerary; }

    # ========= JOIN LINK ==========
    location /joinLink/ { set $upstream_joinLink joinLink:6060;
        proxy_pass http://$upstream_joinLink; }

    # ========= TILE ==========
    location /tile/ { set $upstream_tile tile:6070;
        proxy_pass http://$upstream_tile; }

    # ========= ORG ==========
    location /org/ { set $upstream_org org:6080;
        proxy_pass http://$upstream_org; }

    # ========= UNSORTED ==========
    location /unsorted/ { set $upstream_unsorted unsorted:6090;
        proxy_pass http://$upstream_unsorted; }

    # ========= TICKET ==========
    location /ticket/ { set $upstream_ticket ticket:6000;
        proxy_pass http://$upstream_ticket; }

    # ========= REFUND ==========
    location /refund/ { set $upstream_refund refund:7000;
        proxy_pass http://$upstream_refund; }

    # ========= BLOG ==========
    location /blog/ { set $upstream_blog blog:7010;
        proxy_pass http://$upstream_blog; }

    # ========= COUPON ==========
    location /coupon/ { set $upstream_coupon coupon:7020;
        proxy_pass http://$upstream_coupon; }

    # ========= MEMORY ==========
    location /memory/ { set $upstream_memory memory:7030;
        proxy_pass http://$upstream_memory; }

    # ========= OVERLAY ==========
    location /overlay/ { set $upstream_overlay overlay:7040;
        proxy_pass http://$upstream_overlay; }

    # ========= MAP ==========
    location /map/ { set $upstream_map map:7050;
        proxy_pass http://$upstream_map; }

    # ========= STARMAN ==========
    location /starman/ { set $upstream_starman starman:7060;
        proxy_pass http://$upstream_starman; }

    # ========= DEFAULT ROOT ==========
    # location / {
    #     return 200 'Multiverse Gateway Running (Local HTTP)';
    #     add_header Content-Type text/plain;
    # }
}
