    # ========= JOIN LINK ==========
    set $upstream_joinLink http://joinLink:6060;
    location /joinLink/ { proxy_pass $upstream_joinLink; }

    # ========= TILE ==========
    set $upstream_tile http://tile:6070;
    location /tile/ { proxy_pass $upstream_tile; }

    # ========= ORG ==========
    set $upstream_org http://org:6080;
    location /org/ { proxy_pass $upstream_org; }

    # ========= UNSORTED ==========
    set $upstream_unsorted http://unsorted:6090;
    location /unsorted/ { proxy_pass $upstream_unsorted; }

    # ========= TICKET ==========
    set $upstream_ticket http://ticket:6000;
    location /ticket/ { proxy_pass $upstream_ticket; }

    # ========= REFUND ==========
    set $upstream_refund http://refund:7000;
    location /refund/ { proxy_pass $upstream_refund; }

    # ========= BLOG ==========
    set $upstream_blog http://blog:7010;
    location /blog/ { proxy_pass $upstream_blog; }

    # ========= COUPON ==========
