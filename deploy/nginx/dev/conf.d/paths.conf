# ===============================
# LOCAL HTTP SERVER (Port 80)
# ===============================
server {
    resolver 127.0.0.11 valid=30s;
    listen 80;
    server_name localhost universe.macbease.com;


    # ========= STANDARD HEADERS ==========
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # ========= UNIVERSE ==========
    set $upstream_universe http://universe:5050;
    location /universe/ { proxy_pass $upstream_universe; }

    # ========= IPLS ==========
    set $upstream_ipls http://ipls:5010;
    location /ipls/ { proxy_pass $upstream_ipls; }

    # ========= MULTIVERSE ==========
    set $upstream_multiverse http://multiverse:5020;
    location /multiverse/ { proxy_pass $upstream_multiverse; }

    # ========= CONTENT ==========
    set $upstream_content http://content:5000;
    location /content/ { proxy_pass $upstream_content; }

    # ========= CARD ==========
    set $upstream_card http://card:5030;
    location /card/ { proxy_pass $upstream_card; }

    # ========= RESOURCE ==========
    set $upstream_resource http://resource:5040;
    location /resource/ { proxy_pass $upstream_resource; }

    # ========= EVENT ==========
    set $upstream_event http://event:5060;
    location /event/ { proxy_pass $upstream_event; }

    # ========= BAG ==========
    set $upstream_bag http://bag:5090;
    location /bag/ { proxy_pass $upstream_bag; }

    # ========= BADGE ==========
    set $upstream_badge http://badge:6020;
    location /badge/ { proxy_pass $upstream_badge; }

    # ========= MACBEASE CONTENT ==========
    set $upstream_macbeaseContent http://macbeaseContent:5070;
    location /macbeaseContent/ { proxy_pass $upstream_macbeaseContent; }

    # ========= OFFER ==========
    set $upstream_offer http://offer:5080;
    location /offer/ { proxy_pass $upstream_offer; }

    # ========= QUEST ==========
    set $upstream_quest http://quest:6010;
    location /quest/ { proxy_pass $upstream_quest; }

    # ========= INVITATION ==========
