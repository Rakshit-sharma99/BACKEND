    location /question/ { proxy_pass $upstream_question; }

    # ========= KNOWLEDGE ==========
    set $upstream_knowledge http://knowledge:7080;
    location /knowledge/ { proxy_pass $upstream_knowledge; }

    # ========= CREDIT ==========
    set $upstream_credit http://credit:7090;
    location /credit/ { proxy_pass $upstream_credit; }

    # ========= SERE ==========
    set $upstream_sere http://sere:7100;
    location /sere/ { proxy_pass $upstream_sere; }

    # ========= QUEST1 ==========
    location /quest1/ { proxy_pass http://quest1:7110; }

    # ========= DEFAULT ROOT ==========
    # location / {
    #     return 200 'Multiverse Gateway Running (Local HTTP)';
    #     add_header Content-Type text/plain;
    # }
