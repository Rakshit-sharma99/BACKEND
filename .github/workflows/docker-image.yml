name: Deploy to EC2 with Docker Compose

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Docker & Compose
        run: |
          set -e
          docker --version
          docker compose version

      - name: Prepare environment files
        run: |
          set -e
          echo "=== Preparing env files ==="

          SERVICES=(
            badge bag blog card content event invitation ipls itinerary
            joinLink macbease_content multiverse offer org project quest
            refund resource ticket tile universe unsorted memory overlay
            coupon map 
          )

          for SERVICE in "${SERVICES[@]}"; do
            mkdir -p "env/$SERVICE"
            if [ -f "/home/ubuntu/env/$SERVICE/.env" ]; then
              cp "/home/ubuntu/env/$SERVICE/.env" "env/$SERVICE/.env"
            else
              echo "⚠️ Missing .env for $SERVICE"
            fi
          done

      - name: Stop existing containers
        run: |
          echo "=== Stopping existing stack ==="
          docker compose down || true

      - name: Build and Deploy
        run: |
          set -e
          echo "=== Building & Deploying ==="
          docker compose up -d --build

      - name: Verify deployment
        run: |
          echo "=== Running containers ==="
          docker compose ps
          docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

          echo "=== Health checks ==="
          curl -s -o /dev/null -w "bag → %{http_code}\n" http://localhost:5090/bag/api/v1/hello || true
          curl -s -o /dev/null -w "universe → %{http_code}\n" http://localhost:5050/universe/api/v1/hello || true

      - name: Cleanup unused Docker resources
        run: |
          echo "=== Cleaning up unused Docker resources ==="
          docker image prune -f
