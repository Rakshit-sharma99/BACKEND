name: Deploy to EC2 with Docker Compose
on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: self-hosted
    env:
      # set this to the user your self-hosted runner uses, if different from ubuntu
      RUNNER_USER: ubuntu

    steps:
      - name: Check and Install Prerequisites
        run: |
          set -euo pipefail
          echo "=== Checking and Installing Prerequisites ==="
          echo "OS Info:"; uname -a
          echo "Current User:"; whoami
          echo "Runner user variable: $RUNNER_USER"

          # Install Docker if missing, plus compose plugin (apt) to avoid arch mismatch
          if ! command -v docker >/dev/null 2>&1; then
            echo "Docker not installed, installing..."
            sudo apt update
            sudo apt install -y docker.io docker-compose-plugin
            sudo systemctl enable --now docker
            sudo usermod -aG docker "${RUNNER_USER}" || true
          else
            echo "Docker already installed: $(docker --version)"
          fi

          echo "Testing Docker installation (using sudo to avoid group-login issues)"
          sudo docker --version
          sudo docker ps -a || echo "sudo docker ps failed (daemon might not be ready)"

          echo "Docker Compose (plugin) version (if available):"
          sudo docker compose version || echo "docker compose plugin not available"

          echo "Docker info (sudo):"
          sudo docker info || true

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build and Deploy with Docker Compose
        run: |
          set -euo pipefail
          echo "=== Building and Deploying with Docker Compose ==="

          # If the server has a stored /home/<RUNNER_USER>/env, copy it into workspace env/
          if [ -d "/home/${RUNNER_USER}/env" ]; then
            echo "Copying /home/${RUNNER_USER}/env -> ./env"
            sudo rm -rf ./env || true
            sudo cp -r /home/${RUNNER_USER}/env ./env
            sudo chown -R $(whoami):$(whoami) ./env || true
            echo "Env folder copied."
          else
            echo "No /home/${RUNNER_USER}/env found on host; ensuring workspace env dirs exist."
            mkdir -p env
          fi

          # Diagnostic info
          echo "DIAG: which docker -> $(command -v docker || echo 'none')"
          echo "DIAG: docker --version ->"; sudo docker --version || true
          echo "DIAG: docker info ->"; sudo docker info || true
          echo "DIAG: which docker-compose -> $(command -v docker-compose || echo 'none')"
          echo "DIAG: docker-compose --version ->"; (docker-compose --version 2>/dev/null || true)
          echo "DIAG: trying to detect 'docker compose' subcommand..."

          # Helper to run compose with the available tool
          run_compose() {
            local action="$1"   # eg: up
            local args="${2:-}" # rest of args
            if sudo docker compose version >/dev/null 2>&1; then
              echo "Using: sudo docker compose ${action} ${args}"
              sudo docker compose "${action}" ${args}
            elif command -v docker-compose >/dev/null 2>&1; then
              echo "Using: sudo docker-compose ${action} ${args}"
              sudo docker-compose "${action}" ${args}
            else
              echo "No compose tool found — installing docker-compose plugin via apt..."
              sudo apt update
              sudo apt install -y docker-compose-plugin
              echo "Installed compose plugin; retrying..."
              sudo docker compose version
              echo "Using: sudo docker compose ${action} ${args}"
              sudo docker compose "${action}" ${args}
            fi
          }

          # Build & run detached (works with both docker compose and docker-compose)
          run_compose up "-d --build"

          echo "=== Verifying Deployment ==="
          if sudo docker compose version >/dev/null 2>&1; then
            sudo docker compose ps || true
          else
            sudo docker ps -a || true
          fi

          # Simple health checks (adjust ports/paths as needed)
          echo "Testing ipls endpoint:"
          curl -s -o /dev/null -w "%{http_code}\n" http://localhost:5010 || echo "ipls not responding"
          echo "Testing universe endpoint:"
          curl -s -o /dev/null -w "%{http_code}\n" http://localhost:5050/hello || echo "universe not responding"
