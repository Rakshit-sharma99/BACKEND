      dockerfile: Dockerfile
    image: spargens/refund
    ports:
      - "7000:7000"
    env_file:
      - ./env/refund/.env
    depends_on:
      - kafka
      - zookeeper
      - redis
    networks:
      - app-network
    restart: unless-stopped 

  blog:
    build:
      context: ./blog
      dockerfile: Dockerfile
    image: spargens/blog
    ports:
      - "7010:7010"
    env_file:
      - ./env/blog/.env
    depends_on:
      - kafka
      - zookeeper
      - redis
    networks:
      - app-network
    restart: unless-stopped 

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    depends_on:
      - zookeeper
    networks:
      - app-network
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - app-network
    restart: unless-stopped

  redis:
    image: redis:6.2
    ports:
      - "6379:6379"
    networks:
      - app-network
    restart: unless-stopped 

networks:
  app-network:
    driver: bridge