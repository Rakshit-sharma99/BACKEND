  social-claw:
    build:
      context: ./social-claw
      dockerfile: Dockerfile
    image: spargens/social-claw
    env_file:
      - ./env/social-claw/.env
    volumes:
      - social-claw-data:/app/data
      - social-claw-auth:/app/auth_info
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app-network
    restart: unless-stopped

  kafka:
    image: apache/kafka:latest
    platform: linux/amd64
    container_name: multiverse-backend-kafka-1
    ports:
      - "9092:9092" # client connections
      - "9093:9093" # controller listener (internal)
    environment:
      # KRaft (controller + broker) single-node configuration
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      # controller quorum voters format: id@host:controllerPort
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      # listeners: broker client and controller
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      # expose broker to other containers via service name "kafka"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: "1"
      KAFKA_LOG_RETENTION_HOURS: "168"
      KAFKA_LOG_SEGMENT_BYTES: "1073741824"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      # Optional static cluster id (must be a valid 22-char base64 string for KRaft)
      KAFKA_CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      # where to store data inside container
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      app-network:
        aliases:
          - kafka
    healthcheck:
      test: [ "CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9092'" ]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  redis:
    image: redis:6.2
    ports:
      - "6379:6379"
    networks:
      - app-network
    restart: unless-stopped

  nginx:
    image: nginx:stable
    container_name: nginx-ingress
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/dev/conf.d:/etc/nginx/conf.d:ro
    networks:
      - app-network
    restart: unless-stopped

  quest1:
    build:
      context: ./quest1
      dockerfile: Dockerfile
    image: spargens/quest1
    env_file:
      - ./env/quest1/.env
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
