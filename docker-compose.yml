version: '3.8'

services:
  ipls:
    build:
      context: ./ipls
      dockerfile: Dockerfile
    image: spargens/ipls
    ports:
      - "5010:5010"
    env_file:
      - ./env/ipls/.env
    depends_on:
      - kafka
      - redis
    networks:
      - app-network
    restart: unless-stopped  # Automatically restart

