    env_file:
      - ./env/blog/.env
    depends_on:
      - kafka
      - redis
    networks:
      - app-network
    restart: unless-stopped 

  kafka:
    image: apache/kafka:latest
    container_name: multiverse-testing-kafka-1
    ports:
      - "9092:9092"   # client connections
      - "9093:9093"   # controller listener (internal)
    environment:
      # KRaft (controller + broker) single-node configuration
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      # controller quorum voters format: id@host:controllerPort
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      # listeners: broker client and controller
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      # expose broker to other containers via service name "kafka"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: "1"
      KAFKA_LOG_RETENTION_HOURS: "168"
      KAFKA_LOG_SEGMENT_BYTES: "1073741824"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      # Optional static cluster id (use any value or leave unset to let Kafka generate it)
      KAFKA_CLUSTER_ID: "qwertyuiopasdfghjkl"
      # where to store data inside container
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      app-network:
        aliases:
          - kafka
    healthcheck:
      test: ["CMD", "bash", "-c", "nc -z localhost 9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  redis:
    image: redis:6.2
    ports:
      - "6379:6379"
    networks:
      - app-network
    restart: unless-stopped 

volumes:
  kafka-data:
  
networks:
  app-network:
    driver: bridge